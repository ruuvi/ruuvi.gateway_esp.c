name: Google Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '*' ]
    types: [opened, synchronize, reopened]

jobs:
  google-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Check Python version
        run: |
          which python
          python --version
          python -m pip --version
          which python3
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++ cmake make ninja-build mtools
          sudo apt-get install -y git wget libncurses-dev flex bison gperf ccache libffi-dev libssl-dev
          sudo apt-get install -y locales
          sudo locale-gen de_DE.UTF-8

      - name: Set IDF_PATH
        run: echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      - name: Cache ESP-IDF and tools
        id: cache-esp-idf
        uses: actions/cache@v4
        with:
          path: |
            ~/esp
            ~/.espressif
          key: esp-idf-v4.2.5-${{ runner.os }}-${{ hashFiles('.github/workflows/google-tests.yml') }}

      - name: Download and install ESP-IDF v4.2.5
        if: steps.cache-esp-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone --recursive --branch v4.2.5 https://github.com/espressif/esp-idf.git
          cd $IDF_PATH
          ./install.sh

      - name: Verify ESP-IDF installation
        run: |
          if [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            echo "ESP-IDF installation is missing or cache is incomplete"
            exit 1
          fi

      - name: Build
        run: |
          source "$HOME/esp/esp-idf/export.sh"
          printenv | grep IDF
          idf.py --version          
          cd tests
          mkdir cmake-build-unit-tests
          cd cmake-build-unit-tests
          cmake -G "Ninja" ..
          ninja

      - name: Run tests
        run: |
          cd tests/cmake-build-unit-tests
          ctest --output-on-failure
