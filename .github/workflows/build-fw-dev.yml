name: Build Firmware (dev)

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ '*' ]
    types: [opened, synchronize, reopened]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware (dev)
    environment: dev
    runs-on: ubuntu-22.04
    # Default (read-only) GITHUB_TOKEN; release publishing happens in a separate job.

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Check Python version
        run: |
          which python
          python --version
          python -m pip --version
          which python3
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake gcovr mtools
          sudo apt-get install -y gcc git wget make libncurses-dev flex bison gperf cmake ninja-build ccache libffi-dev libssl-dev

      - name: Set IDF_PATH
        run: echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      - name: Cache ESP-IDF and tools
        id: cache-esp-idf
        uses: actions/cache@v5
        with:
          path: |
            ~/esp
            ~/.espressif
          key: esp-idf-v4.2.5-v1

      - name: Download and install ESP-IDF v4.2.5
        if: steps.cache-esp-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone --recursive --branch v4.2.5 https://github.com/espressif/esp-idf.git
          cd $IDF_PATH
          ./install.sh

      - name: Verify ESP-IDF installation
        run: |
          if [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            echo "ESP-IDF installation is missing or cache is incomplete"
            exit 1
          fi

      - name: Prepare secure boot signing key
        env:
          SECURE_BOOT_SIGNING_KEY: ${{ secrets.SECURE_BOOT_SIGNING_KEY }}
        run: |
          set +x # do not echo secrets
          mkdir -p ~/.signing_keys
          install -m 600 /dev/null ~/.signing_keys/secure_boot_signing_key.pem
          printf "%s" "$SECURE_BOOT_SIGNING_KEY" > ~/.signing_keys/secure_boot_signing_key.pem

      - name: Run build
        run: |
          lsb_release -a          
          source "$HOME/esp/esp-idf/export.sh"
          python --version
          which python
          python -m pip install bincopy
          printenv | grep IDF
          idf.py --version          
          mkdir build
          cd build
          cmake .. -G Ninja
          ninja
          touch ../CMakeLists.txt
          cmake .. -G Ninja
          ninja
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruuvi_gateway_fw
          path: |
            build/ruuvi_gateway_esp.bin
            build/binaries_v1.9.2/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
            build/fatfs_nrf52.bin
            build/fatfs_gwui.bin
            build/gw_cfg_def.bin

      - name: Create release zip
        id: create_zip
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -xeuo pipefail
          # github.ref_name may contain '/' (e.g. "release/v1.2.3"); sanitize so
          # the zip filename and uploaded asset name stay a single path component
          # and the dev/prod naming scheme remains unique.
          SAFE_TAG="${TAG//\//_}"
          ARTIFACT_NAME="ruuvi_gateway_fw-dev_${SAFE_TAG}"
          DST="$ARTIFACT_NAME"
          mkdir -p "$DST"
          paths=(
            "build/ruuvi_gateway_esp.bin"
            "build/binaries_v1.9.2/bootloader.bin"
            "build/partition_table/partition-table.bin"
            "build/ota_data_initial.bin"
            "build/fatfs_nrf52.bin"
            "build/fatfs_gwui.bin"
            "build/gw_cfg_def.bin"
          )
          for rel in "${paths[@]}"; do
            dst_path="$DST/${rel#build/}"
            mkdir -p "$(dirname "$dst_path")"
            cp "$rel" "$dst_path"
          done
          ARTIFACT_PATH="$GITHUB_WORKSPACE/$ARTIFACT_NAME.zip"
          zip -r -q "$ARTIFACT_PATH" "$ARTIFACT_NAME"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "artifact_path=$ARTIFACT_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload release zip as workflow artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ruuvi_gateway_fw-dev-release-zip
          path: ${{ steps.create_zip.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release (dev)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAG: ${{ github.ref_name }}
      # Keep in sync with the sanitization in the build job's "Create release zip" step.
      ARTIFACT_NAME: ruuvi_gateway_fw-dev_${{ replace(github.ref_name, '/', '_') }}
    steps:
      - name: Download release zip artifact
        uses: actions/download-artifact@v4
        with:
          name: ruuvi_gateway_fw-dev-release-zip
          path: release_asset

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -xe
          command -v gh >/dev/null 2>&1 || { echo "gh CLI not found"; exit 1; }
          ARTIFACT_PATH="$GITHUB_WORKSPACE/release_asset/${ARTIFACT_NAME}.zip"
          if [ ! -f "$ARTIFACT_PATH" ]; then
            echo "Artifact not found at $ARTIFACT_PATH"; ls -la "$GITHUB_WORKSPACE/release_asset" || true
            exit 1
          fi
          # create if missing; on failure re-check to tolerate races with the prod workflow
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if ! gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "Automated release" --prerelease; then
              echo "Create failed; rechecking..."
              if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                echo "Release still missing; aborting."
                exit 1
              fi
            fi
          fi
          gh release upload "$TAG" "$ARTIFACT_PATH" --repo "$GITHUB_REPOSITORY" --clobber
