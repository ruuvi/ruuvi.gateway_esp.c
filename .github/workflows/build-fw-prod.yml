name: Build Firmware (prod)

on:
  push:
    branches:
      - master
      - 'v[0-9]*.[0-9]*.x'
    tags: [ '*' ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Firmware (prod)
    environment: prod
    runs-on: ubuntu-22.04
    # Use the default GITHUB_TOKEN permissions for this job; release publishing happens in a separate job.
    env:
      # Single source of truth for the files shipped as both the workflow
      # artifact and the released version. Keep paths relative to
      # the repository root and inside the `build/` directory.
      RELEASE_FILES: |
        build/ruuvi_gateway_esp.bin
        build/binaries_v1.9.2/bootloader.bin
        build/partition_table/partition-table.bin
        build/ota_data_initial.bin
        build/fatfs_nrf52.bin
        build/fatfs_gwui.bin
        build/gw_cfg_def.bin

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Set up Python 3.8
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Check Python version
        run: |
          which python
          python --version
          python -m pip --version
          which python3
          python3 --version
          python3 -m pip --version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake gcovr
          sudo apt-get install -y gcc git wget make libncurses-dev flex bison gperf cmake ninja-build ccache libffi-dev libssl-dev

      - name: Set IDF_PATH
        run: echo "IDF_PATH=$HOME/esp/esp-idf" >> $GITHUB_ENV

      - name: Cache ESP-IDF and tools
        id: cache-esp-idf
        uses: actions/cache@v5
        with:
          path: |
            ~/esp
            ~/.espressif
          key: esp-idf-v4.2.2-v1

      - name: Download and install ESP-IDF v4.2.2
        if: steps.cache-esp-idf.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone --recursive --branch v4.2.2 https://github.com/espressif/esp-idf.git
          cd $IDF_PATH
          ./install.sh

      - name: Verify ESP-IDF installation
        run: |
          if [ ! -f "$HOME/esp/esp-idf/export.sh" ]; then
            echo "ESP-IDF installation is missing or cache is incomplete"
            exit 1
          fi

      - name: Prepare secure boot signing key
        env:
          SECURE_BOOT_SIGNING_KEY: ${{ secrets.SECURE_BOOT_SIGNING_KEY }}
        run: |
          set +x # do not echo secrets
          if [ -z "$SECURE_BOOT_SIGNING_KEY" ]; then
            echo "SECURE_BOOT_SIGNING_KEY is not set"
            exit 1
          fi
          mkdir -p ~/.signing_keys
          install -m 600 /dev/null ~/.signing_keys/secure_boot_signing_key.pem
          printf "%s" "$SECURE_BOOT_SIGNING_KEY" > ~/.signing_keys/secure_boot_signing_key.pem

      - name: Run build
        run: |
          lsb_release -a          
          source "$HOME/esp/esp-idf/export.sh"
          python --version
          which python
          python -m pip install bincopy
          printenv | grep IDF
          idf.py --version          
          mkdir build
          cd build
          cmake .. -G Ninja
          ninja
          touch ../CMakeLists.txt
          cmake .. -G Ninja
          ninja
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ruuvi_gateway_fw
          path: ${{ env.RELEASE_FILES }}

  release:
    name: Publish GitHub Release (prod)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # create GitHub Release and upload assets
      actions: read     # download workflow artifact from the build job
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v8
        with:
          name: ruuvi_gateway_fw
          path: release_files

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -xe
          command -v gh >/dev/null 2>&1 || { echo "gh CLI not found"; exit 1; }
          RELEASE_DIR="$GITHUB_WORKSPACE/release_files"
          if [ ! -d "$RELEASE_DIR" ]; then
            echo "Release files directory not found at $RELEASE_DIR"
            exit 1
          fi
          # Collect all files from the downloaded artifact. upload-artifact
          # flattens to the common ancestor of the input paths (here: build/),
          # so subdirectories like binaries_v1.9.2/ and partition_table/ are
          # preserved but file basenames remain unique across the asset set.
          mapfile -t ASSETS < <(find "$RELEASE_DIR" -type f | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release files found under $RELEASE_DIR"
            exit 1
          fi
          # Create the release if it does not already exist.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if ! gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "Automated release" --prerelease; then
              echo "Create failed; rechecking..."
              if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                echo "Release still missing; aborting."
                exit 1
              fi
            fi
          fi
          gh release upload "$TAG" "${ASSETS[@]}" --repo "$GITHUB_REPOSITORY" --clobber
