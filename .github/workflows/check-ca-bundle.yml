name: Check CA Bundle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '*' ]
    types: [opened, synchronize, reopened]
  schedule:
    # Run weekly (Monday 06:00 UTC) so updates are noticed even without commits.
    # NOTE: scheduled runs only fire on the repository's default branch.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Workflow-level permissions are kept minimal. The `notify` job below
# requests `issues: write` at the job level, and it only runs on `schedule`.
permissions:
  contents: read

jobs:
  check-ca-bundle:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    # Expose the script's raw exit code to downstream jobs so they can
    # distinguish "bundle is stale" (1) from "internal error" (2) — the
    # built-in `needs.<job>.result` (success/failure) cannot tell them apart.
    outputs:
      exit_code: ${{ steps.run.outputs.exit_code }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      # Capture the script's exit code without failing the step, so that
      # the `gate` step below can both (a) propagate it to downstream jobs
      # via a step output, and (b) still mark this job as failed when the
      # bundle is stale (exit 1) or the check errored (exit 2).
      - name: Verify bundled Mozilla CA certificates are up-to-date
        id: run
        shell: bash
        run: |
          set +e
          bash scripts/check_ca_bundle_up_to_date.sh
          rc=$?
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Fail the job if the check did not succeed
        if: steps.run.outputs.exit_code != '0'
        run: |
          echo "::error::scripts/check_ca_bundle_up_to_date.sh exited with code ${{ steps.run.outputs.exit_code }}"
          exit 1

  # Schedule-only job that opens or closes a tracking issue based on the
  # outcome of `check-ca-bundle`. Kept as a separate job so `issues: write`
  # is granted only for scheduled runs (GitHub Actions permissions are
  # job-scoped, not step-scoped).
  notify:
    needs: check-ca-bundle
    if: github.event_name == 'schedule' && always()
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open or close the CA-bundle tracking issue
        uses: actions/github-script@v7
        env:
          CHECK_EXIT_CODE: ${{ needs.check-ca-bundle.outputs.exit_code }}
          CHECK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title  = 'CA bundle (esp_crt_bundle/cacert.pem) is out of date';
            const runUrl = process.env.CHECK_RUN_URL;
            const exit   = process.env.CHECK_EXIT_CODE;
            // 0 = bundle fresh, 1 = bundle stale, anything else = internal error
            // (download/parse failure, etc.). Internal errors must NOT toggle
            // the tracking issue, otherwise transient outages would create
            // misleading "out of date" reports.
            if (exit !== '0' && exit !== '1') {
              core.warning(
                `CA-bundle check exited with code '${exit}' (internal error). ` +
                `Leaving the tracking issue untouched. See ${runUrl}.`);
              return;
            }
            const stale = exit === '1';

            // Find any existing open tracking issue with this exact title.
            // The repository does not define dedicated labels for this check,
            // so we identify the issue purely by its (constant) title.
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(i => i.title === title && !i.pull_request);

            if (stale) {
              const body = [
                'The scheduled **Check CA Bundle** workflow found a newer Mozilla CA',
                'certificate bundle on https://curl.se/docs/caextract.html.',
                '',
                'The bundle embedded in the firmware (`esp_crt_bundle/cacert.pem`)',
                'should be refreshed so that TLS connections continue to trust',
                'newly-added roots and stop trusting roots that have been removed.',
                '',
                `**Failing run:** ${runUrl}`,
                '',
                '### How to update',
                '',
                '```bash',
                'scripts/check_ca_bundle_up_to_date.sh --update',
                'git add esp_crt_bundle/cacert.pem',
                'git commit -m "esp_crt_bundle: update Mozilla CA bundle"',
                '```',
                '',
                'The next successful scheduled run of this workflow will close',
                'this issue automatically.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
                core.notice(`Refreshed tracking issue #${existing.number}.`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title,
                  body,
                });
                core.notice(`Opened tracking issue #${created.number}.`);
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                body: `Resolved automatically: the bundled CA certificates are up-to-date again. See ${runUrl}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.notice(`Closed tracking issue #${existing.number}.`);
            } else {
              core.info('Bundle is up-to-date and no tracking issue is open. Nothing to do.');
            }
