name: Check CA Bundle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '*' ]
    types: [opened, synchronize, reopened]
  schedule:
    # Run weekly (Monday 06:00 UTC) so updates are noticed even without commits.
    # NOTE: scheduled runs only fire on the repository's default branch.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Workflow-level permissions are kept minimal. The `notify` job below
# requests `issues: write` at the job level, and it only runs on `schedule`.
permissions:
  contents: read

jobs:
  check-ca-bundle:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Verify bundled Mozilla CA certificates are up-to-date
        id: check
        run: bash scripts/check_ca_bundle_up_to_date.sh

  # Schedule-only job that opens or closes a tracking issue based on the
  # outcome of `check-ca-bundle`. Kept as a separate job so `issues: write`
  # is granted only for scheduled runs (GitHub Actions permissions are
  # job-scoped, not step-scoped).
  notify:
    needs: check-ca-bundle
    if: github.event_name == 'schedule' && always()
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open or close the CA-bundle tracking issue
        uses: actions/github-script@v7
        env:
          CHECK_RESULT: ${{ needs.check-ca-bundle.result }}
          CHECK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title  = 'CA bundle (esp_crt_bundle/cacert.pem) is out of date';
            const labels = ['maintenance', 'security'];
            const stale  = process.env.CHECK_RESULT === 'failure';
            const runUrl = process.env.CHECK_RUN_URL;

            // Find any existing open tracking issue with this exact title.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'maintenance',
              per_page: 100,
            });
            const existing = openIssues.find(i => i.title === title);

            if (stale) {
              const body = [
                'The scheduled **Check CA Bundle** workflow found a newer Mozilla CA',
                'certificate bundle on https://curl.se/docs/caextract.html.',
                '',
                'The bundle embedded in the firmware (`esp_crt_bundle/cacert.pem`)',
                'should be refreshed so that TLS connections continue to trust',
                'newly-added roots and stop trusting roots that have been removed.',
                '',
                `**Failing run:** ${runUrl}`,
                '',
                '### How to update',
                '',
                '```bash',
                'scripts/check_ca_bundle_up_to_date.sh --update',
                'git add esp_crt_bundle/cacert.pem',
                'git commit -m "esp_crt_bundle: update Mozilla CA bundle"',
                '```',
                '',
                'The next successful scheduled run of this workflow will close',
                'this issue automatically.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
                core.notice(`Refreshed tracking issue #${existing.number}.`);
              } else {
                const { data: created } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  title,
                  body,
                  labels,
                });
                core.notice(`Opened tracking issue #${created.number}.`);
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                body: `Resolved automatically: the bundled CA certificates are up-to-date again as of ${runUrl}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
              core.notice(`Closed tracking issue #${existing.number}.`);
            } else {
              core.info('Bundle is up-to-date and no tracking issue is open. Nothing to do.');
            }
